<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FinTrack | AI Accounting</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .hero-gradient { background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%); }
    </style>
</head>
<body class="bg-slate-950 text-white font-sans antialiased">
    <nav class="container mx-auto px-6 py-6 flex justify-between items-center">
        <div class="text-2xl font-bold tracking-tighter text-blue-500">FinTrack.</div>
        <button class="bg-blue-600 hover:bg-blue-500 px-5 py-2 rounded-full text-sm font-semibold transition">Get Started</button>
    </nav>
    <header class="container mx-auto px-6 py-20 text-center">
        <h1 class="text-6xl font-extrabold mb-6 leading-tight">Master Your Finances with <br><span class="text-blue-500">AI Precision</span></h1>
        <p class="text-xl text-slate-400 mb-10 max-w-2xl mx-auto">Automate your accounting, reduce tax liability, and gain real-time insights with the world's most intuitive financial dashboard.</p>
        <div class="max-w-md mx-auto bg-slate-900 p-2 rounded-xl flex shadow-2xl border border-slate-800">
            <input type="email" placeholder="Enter your business email" class="w-full bg-transparent px-4 py-3 focus:outline-none placeholder-slate-600">
            <button class="bg-blue-600 px-6 py-3 rounded-lg hover:bg-blue-700 font-bold transition">Start Free Trial</button>
        </div>
    </header>
</body>
</html>
